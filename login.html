<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Damasceno's Hair</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="icon" type="image/png" href="img/Logo (2).png">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="logo-container">
                <img src="img/Logo (2).png" alt="Logo Damasceno's Hair">
                <h1>Damasceno's Hair</h1>
            </div>

            <div class="tabs">
                <button class="tab active" onclick="mostrarLogin()">Entrar</button>
                <button class="tab" onclick="mostrarCadastro()">Cadastrar</button>
            </div>

            <!-- Formulário de Login -->
            <form id="form-login" class="form-auth">
                <h2>Bem-vindo de volta!</h2>
                <p class="subtitle">Entre com suas credenciais</p>

                <div class="form-group">
                    <label for="login-nome">Nome</label>
                    <input type="text" id="login-nome" required placeholder="Digite seu nome">
                </div>

                <div class="form-group">
                    <label for="login-senha">Senha</label>
                    <input type="password" id="login-senha" required placeholder="Digite sua senha">
                </div>

                <div id="login-error" class="error-message"></div>

                <button type="submit" class="btn-submit">Entrar</button>
            </form>

            <!-- Formulário de Cadastro -->
            <form id="form-cadastro" class="form-auth hidden">
                <h2>Crie sua conta</h2>
                <p class="subtitle">Preencha os dados para começar</p>

                <div class="form-group">
                    <label for="cadastro-nome">Nome</label>
                    <input type="text" id="cadastro-nome" required placeholder="Digite seu nome completo">
                </div>

                <div class="form-group">
                    <label for="cadastro-senha">Senha</label>
                    <input type="password" id="cadastro-senha" required placeholder="Crie uma senha">
                </div>

                <div class="form-group">
                    <label for="cadastro-confirma">Confirmar Senha</label>
                    <input type="password" id="cadastro-confirma" required placeholder="Confirme sua senha">
                </div>

                <div id="cadastro-error" class="error-message"></div>
                <div id="cadastro-success" class="success-message"></div>

                <button type="submit" class="btn-submit">Cadastrar</button>
            </form>

            <div class="info-demo">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M12 16V12M12 8H12.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <p>Site de demonstração - Dados salvos localmente no navegador</p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
