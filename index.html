    <script>
        // Verificar login antes de acessar agendamento
        function verificarLoginEAgendar(event) {
            event.preventDefault();
            
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            
            if (isLoggedIn === 'true') {
                window.location.href = 'agendamento.html';
            } else {
                sessionStorage.setItem('redirecionarApos', 'agendamento.html');
                window.location.href = 'login.html';
            }
        }

        // Atualizar navegação do perfil
        window.addEventListener('DOMContentLoaded', function() {
            const perfilLink = document.querySelector('a[href="perfil.html"]');
            if (perfilLink) {
                perfilLink.addEventListener('click', function(e) {
                    const isLoggedIn = localStorage.getItem('isLoggedIn');
                    if (isLoggedIn !== 'true') {
                        e.preventDefault();
                        sessionStorage.setItem('redirecionarApos', 'perfil.html');
                        window.location.href = 'login.html';
                    }
                });
            }
        });
    </script>
